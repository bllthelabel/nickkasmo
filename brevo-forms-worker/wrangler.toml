BREVO_SENDER_EMAIL = "hallo@nickkasmo.nl"
BREVO_SENDER_NAME = "NickKasmo.nl"
# Inbox that receives contact form submissions.
CONTACT_TO_EMAIL = "hallo@nickkasmo.nl"
